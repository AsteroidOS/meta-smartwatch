
#@TYPE: Machine
#@NAME: Casio WSD-F21hr
#@DESCRIPTION: Machine configuration for the Casio Pro Trek WSD-F21hr

require conf/machine/include/arm/armv7a/tune-cortexa7.inc
# Kernel is 64 bit while userspace needs 32 bit android blobs - for 64 bit recipes, see kernel recipe and hacked gcc+binutils.
DEFAULTTUNE = "armv7vehf-neon"
require conf/machine/include/hybris-watch.inc

MACHINE_DISPLAY_ROUND = "true"
MACHINE_DISPLAY_FLAT_TIRE = "20"
MACHINE_NEEDS_BURN_IN_PROTECTION = "false"
MACHINE_HAS_WLAN = "true"

PREFERRED_PROVIDER_virtual/android-system-image = "android"
PREFERRED_VERSION_android = "armv7+pie64"

PREFERRED_PROVIDER_virtual/kernel = "linux-medaka"
PREFERRED_VERSION_linux = "4.4+pie"

IMAGE_INSTALL += "sensorfw-hybris-binder-plugins udev-droid-system bluebinder swclock-offset underclock asteroid-hrm asteroid-compass lcd-tools"
