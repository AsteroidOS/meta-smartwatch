# The modem PIL firmware (mba.*, modem.*) is byte-identical to the copies on
# the device's own factory "modem" partition (mmcblk0p1), mounted read-only at
# /firmware (see fstab). Symlink each file into the kernel firmware search path
# rather than shipping a hosted-tarball copy of bytes the device already holds.
#
# Per-file, not a whole-directory symlink, and that is load-bearing rather than
# stylistic: this firmware directory is shared. It also holds BCM43430A1.hcd
# (consumed by bluetooth-rfkill-event), the adsp.* ADSP PIL firmware, WiFi
# (fw_bcmdhd*), NFC, touch and GPU blobs -- none of which live on the modem
# partition. A directory-level symlink would break every one of those.
#
# L+ (replace), not L (create-if-absent): on a device upgraded from the old
# nemo-modem-firmware fetch package, real files may still occupy these paths
# when tmpfiles runs; plain L would log an error and leave the stale real file
# winning silently. L+ makes the mounted firmware authoritative and idempotent.
L+ /usr/libexec/hal-droid/system/vendor/firmware/mba.b00 - - - - /firmware/image/mba.b00
L+ /usr/libexec/hal-droid/system/vendor/firmware/mba.mdt - - - - /firmware/image/mba.mdt
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b00 - - - - /firmware/image/modem.b00
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b01 - - - - /firmware/image/modem.b01
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b02 - - - - /firmware/image/modem.b02
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b03 - - - - /firmware/image/modem.b03
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b04 - - - - /firmware/image/modem.b04
L+ /usr/libexec/hal-droid/system/vendor/firmware/modem.b05 - - - - /firmware/image/modem.b05
