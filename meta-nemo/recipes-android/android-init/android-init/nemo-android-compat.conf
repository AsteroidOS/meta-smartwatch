d /dev/graphics 0755 root root -
L /dev/graphics/fb0 - - - - /dev/fb0

# sensors.qcom's registry (sns_fsa/sns_reg) needs a writable data
# directory; without it the daemon exits during registry init. Stock
# creates this in init.nemo.rc. The factory calibration counterpart
# lives on the persist partition, mounted at /persist via persist.mount.
d /data 0755 root root -
d /data/misc 0755 root root -
d /data/misc/sensors 0775 root root -

# rmt_storage serves the modem's EFS partitions over QMI and opens them
# via /dev/block/bootdevice/by-name/<partname>. udev's coldplug pass
# (udev-droid-system's by-name rule) populates equivalent symlinks too
# late in boot on this device -- the modem comes out of reset at ~8s and
# errfatals on EFS-sync timeout before udev's blkid pass over all 34
# partitions completes, resetting the whole SoC. Static symlinks from
# tmpfiles.d exist before android-init starts anything. Partition numbers
# are fixed by this device's factory GPT (PARTNAME read from
# /sys/block/mmcblk0/mmcblk0p*/uevent).
d /dev/block 0755 root root -
d /dev/block/bootdevice 0755 root root -
d /dev/block/bootdevice/by-name 0755 root root -
L /dev/block/bootdevice/by-name/modem - - - - /dev/mmcblk0p1
L /dev/block/bootdevice/by-name/modemst1 - - - - /dev/mmcblk0p12
L /dev/block/bootdevice/by-name/modemst2 - - - - /dev/mmcblk0p13
L /dev/block/bootdevice/by-name/fsc - - - - /dev/mmcblk0p14
L /dev/block/bootdevice/by-name/ssd - - - - /dev/mmcblk0p15
L /dev/block/bootdevice/by-name/fsg - - - - /dev/mmcblk0p18
