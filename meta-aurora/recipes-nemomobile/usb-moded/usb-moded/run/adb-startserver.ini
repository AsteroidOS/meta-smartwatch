[info]
name = android-tools-adbd.service
mode = adb_mode
systemd = 1
# Aurora override: NO `post = 1`. On GKI 5.15's configfs gadget,
# usb-moded's configfs_set_udc() triggers the kernel's composite_bind
# walk, which calls ffs_func_bind() for every function in configs/b.1.
# ffs_func_bind requires the FunctionFS instance to have descriptors
# already written by userspace (raw_descs_data + raw_descs_length set,
# kernel drivers/usb/gadget/function/f_fs.c) -- without them it returns
# -ENODEV, composite_bind fails, the UDC write fails. Running adbd in
# the appsync PRE phase means adbd opens /dev/usb-ffs/adb/ep0 and
# writes its descriptors BEFORE usb-moded calls configfs_set_udc.
# Upstream's `post = 1` is correct for sysfs-based android_usb kernels
# where descriptors are kernel-side; it's not for configfs.
