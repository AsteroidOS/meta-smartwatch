[mode]
name = adb_mode
module = none
appsync = 1

[options]
# On legacy /sys/class/android_usb-capable kernels these sysfs_* lines wrote
# "adb" into android0/functions. Aurora's GKI 5.15 kernel only has the configfs
# gadget framework, so usb-moded's configfs branch reads sysfs_value directly
# and feeds it to configfs_register_function(), which mkdirs
# /config/usb_gadget/g1/functions/<value>. The configfs gadget framework
# requires function names of the form "<type>.<instance>" (see kernel
# drivers/usb/gadget/configfs.c function_make()): plain "adb" is rejected with
# -EINVAL ("Unable to locate . in FUNC.INSTANCE"). The configfs-correct value
# is "ffs.adb", which usb-moded creates, then symlinks into
# configs/b.1/ffs.adb. adbd's FunctionFS mount at /dev/usb-ffs/adb (tag "adb"
# in adbd-functionfs.sh) binds the corresponding functionfs instance, so adbd's
# ep0 descriptors flow into the ffs.adb configfs function.
sysfs_path = /sys/class/android_usb/android0/functions
sysfs_value = ffs.adb
android_extra_sysfs_path =  /sys/class/android_usb/android0/f_ffs/aliases
android_extra_sysfs_value = adb
sysfs_reset_value = none
softconnect_path = /sys/class/android_usb/android0/enable
softconnect = 1
softconnect_disconnect = 0
idProduct = D002
