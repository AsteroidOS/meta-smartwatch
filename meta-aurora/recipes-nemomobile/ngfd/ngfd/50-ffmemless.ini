# Aurora ships an empty supported_effects: every ngfd event resolves to the
# patched FF_PERIODIC default fall-back effect (sine, from meta-asteroid
# 0004-ffmemless-add-FF_PERIODIC-fallback-for-default-effec.patch). Per-event
# duration comes from haptic.duration in events.d, applied to the kernel effect
# via 0005-ffmemless-fire-single-shot-and-honor-haptic.duration.patch.
#
# cache_effects = true is REQUIRED: it makes ffmemless re-upload the effect on
# every play, so each event sees its own cached_effect.replay.length (the value
# 0005 plumbs in from haptic.duration). Without it, ffmemless uploads once at
# init at the default 240ms and never updates -- every event feels identical
# regardless of haptic.duration.
[ffmemless]

system_effects_env = NGF_FFMEMLESS_SETTINGS

cache_effects = true

supported_effects =
