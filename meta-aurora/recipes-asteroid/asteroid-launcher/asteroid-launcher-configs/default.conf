EGL_PLATFORM=hwcomposer
QT_QPA_PLATFORM=hwcomposer
LIPSTICK_OPTIONS="-plugin evdevtouch:/dev/input/event2 -plugin evdevkeyboard:/dev/input/event0:keymap=/usr/share/qt5/keymaps/keys.qmap"
QT_ENABLE_GLYPH_CACHE_WORKAROUND=true
QT_IM_MODULE=qtvirtualkeyboard

# Point libhybris's Android linker at this device's Android-13 /system libs
# (LXC container rootfs), the A13 vendor (/vendor -> /android/vendor), the
# pie64 hal-droid tree (where libui_compat_layer.so lives), and the runtime
# apex bionic dir (for libdl_android.so, a dangling /apex symlink in
# /system/lib).
HYBRIS_LD_LIBRARY_PATH=/var/lib/lxc/android/rootfs/system/lib:/vendor/lib:/usr/libexec/hal-droid/system/lib:/var/lib/lxc/android/rootfs/apex/com.android.runtime/lib/bionic

# Strip UBWC-triggering bits (HW_COMPOSER, PRIVATE_ALLOC_UBWC,
# PRIVATE_ALLOC_UBWC_PI) from HWComposerNativeWindow's buffer usage so the
# allocator returns linear (modifier=0) buffers. Monaco's only
# launcher-eligible SDE plane is plane 70 (DMA pipe), which can't scan UBWC;
# without this, drmModeAtomicCommit fails -EINVAL and the launcher loops on
# `prepare: validate failed`. Read by the aurora-only libhybris patch
# (libhybris-aurora-disable-ubwc-usage).
HYBRIS_HWC_DISABLE_COMPOSER_USAGE=1
