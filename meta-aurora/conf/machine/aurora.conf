#@TYPE: Machine
#@NAME: Google Pixel Watch 2
#@DESCRIPTION: Machine configuration for the Pixel Watch 2

# We use an armv7 userspace for hybris compatibility
require conf/machine/include/arm/armv7a/tune-cortexa7.inc
DEFAULTTUNE = "armv7vehf-neon"
require conf/machine/include/hybris-watch.inc

# The Android side runs as a Halium LXC container, so drop meta-asteroid's
# `android-init` and meta-android's `android-system` (both added by
# hybris-watch.inc) -- we ship our own LXC bundle instead.
IMAGE_INSTALL:remove = "android-init android-system"

MACHINE_HAS_WLAN = "true"
MACHINE_HAS_SPEAKER = "true"
MACHINE_DISPLAY_ROUND = "true"

PREFERRED_PROVIDER_virtual/android-system-image = "android"
PREFERRED_VERSION_android = "armv7+pie64"

# Even though we're using an Android 13 base - the 11 headers are good enough.
PREFERRED_PROVIDER_virtual/android-headers = "android-headers-halium"
PREFERRED_VERSION_android-headers-halium = "11.0"

# Aurora's kernel is aarch64; userspace is armv7.
TUNE_PKGARCH:pn-linux-aurora = "aarch64"
PREFERRED_PROVIDER_virtual/kernel = "linux-aurora"
# Keep in sync with AURORA_KERNEL_VERSION in
# recipes-kernel/linux/linux-aurora-version.inc (machine conf can't
# require recipe-space files).
PREFERRED_VERSION_linux-aurora = "5.15.144+git%"

# Modern kernels use configfs rather than functionfs
PREFERRED_PROVIDER_android-tools-conf = "android-tools-conf-configfs"

# Various hw support packages.
IMAGE_INSTALL += "sensorfw-hybris-binder-plugins udev-droid-system bluebinder swclock-offset underclock asteroid-hrm asteroid-compass"

# qcacld picks the regulatory domain from /lib/firmware/regulatory.db at init;
# without it cfg80211 stays in world-roaming and most channels are inactive.
# wireless-regdb-static ships the upstream database without requiring CRDA.
IMAGE_INSTALL += "wireless-regdb-static"

# /vendor: aurora's stock vendor partition is a logical partition inside /super
# (/dev/mmcblk0p80, slot B). aurora-vendor-mount recreates the dm-linear
# mapping at boot, exposes it as /dev/mapper/vendor_b, and mounts it at /vendor
# so Halium HAL services (hwcomposer, vndservicemanager, BT HAL, ...) resolve
# /vendor/bin/hw/* etc.
IMAGE_INSTALL += "aurora-vendor-mount"

# Halium-13 LXC container.
IMAGE_INSTALL += "lxc aurora-lxc-android"

# Build the three flashable boot artifacts (boot.img, vendor_kernel_boot.img,
# init_boot.img) as a side-effect of `bitbake asteroid-image`. The dep is
# expressed narrowly via asteroid-image.bbappend rather than EXTRA_IMAGEDEPENDS
# here -- EXTRA_IMAGEDEPENDS would add it to initramfs-android-image too,
# which aurora-boot-images itself consumes, forming a cycle.

# Ship the out-of-tree vendor modules (qcacld WLAN, audio dlkms,
# bolero/wcd/swr/macro codecs, machine_dlkm sound card, nanohub, touch,
# cs40l26, etc.) to /lib/modules/${KREL}/vendor on the rootfs. Without this,
# only modules baked into the VKB initramfs (modules.load.aurora) are reachable
# -- post-boot audio/WLAN/sensors that aren't loaded at initramfs time can't be
# loaded at all.
IMAGE_INSTALL += "linux-aurora-modules"

# Post-rootfs auto-load: ships /etc/modules-load.d/aurora-post-rootfs.conf so
# systemd-modules-load brings up WLAN + ASoC machine/codecs + BT slim after
# pivot_root, when the linux-aurora-modules .ko's become reachable.
IMAGE_INSTALL += "aurora-modules-autoload"

# gralloc4 shim for libhybris. libhybris takes its gralloc4 path only if it can
# android_dlopen("libui_compat_layer.so") and resolve
# graphic_buffer_allocator_allocate; otherwise it falls back to
# hw_get_module("gralloc"), which on A13 finds only gralloc.default.so
# (software stub) and SIGSEGVs the compositor.
IMAGE_INSTALL += "aurora-libui-compat-layer"

