# Modules whose .ko files live on the rootfs (/lib/modules/<KREL>/vendor/)
# and therefore cannot be loaded from the VKB initramfs modules.load.aurora.
# Systemd's systemd-modules-load.service walks this file at boot, after the
# rootfs is mounted -- modprobe then resolves dependencies from modules.dep.
# Order is informational; modprobe handles dep resolution.

# --- WLAN (qcacld-3.0 + CNSS platform glue) ---
# wlan.ko is the qcacld driver. icnss2 is the integrated cnss subsystem that
# brokers WLFW QMI between the driver and the modem firmware. The cnss_*
# helpers are utility modules.
wlan
icnss2
cnss_nl
cnss_plat_ipc_qmi_svc
cnss_prealloc
cnss_utils
wlan_firmware_service
google_wlan_mac

# --- ASoC machine driver + codecs ---
# machine_dlkm is monaco-asoc-snd. Pulls bolero/wcd/wsa/macros/swr via deps.
# We list a few key ones explicitly so a stale modules.dep does not bite.
machine_dlkm
stub_dlkm
bolero_cdc_dlkm
besbev_dlkm
besbev-slave_dlkm
wsa883x_dlkm
wcd9xxx_dlkm
wcd_core_dlkm
rx_macro_dlkm
tx_macro_dlkm
va_macro_dlkm
swr_dlkm
swr_ctrl_dlkm
pinctrl_lpi_dlkm
pmw5100-spmi_dlkm
cc_dlkm
audio_cc_ipc_dlkm

# --- BT slimbus codec + power (gated by qcom,wcn-btfm in DT) ---
# bt_fm_slim registers "btfmslim_slave" -- required by monaco-asoc-snd's WCN BT
# dai_links.
bt_fm_slim
btpower

# --- BT vHCI (host-side virtual HCI for bluebinder) ---
hci_vhci
