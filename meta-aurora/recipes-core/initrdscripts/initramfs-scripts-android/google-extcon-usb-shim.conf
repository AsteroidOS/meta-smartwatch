# Aurora: the google-extcon-usb-shim DT default is to force-disable USB at boot
# ("USB force-disable:1 changeable:1 dt-support:1 disable-param:0x1" appears in
# dmesg). With USB gated off, dwc3-msm never registers a UDC and /sys/class/udc
# stays empty -- our configfs adb gadget can't bind, so no adb.
options google-extcon-usb-shim usb_force_disable_boot=0
