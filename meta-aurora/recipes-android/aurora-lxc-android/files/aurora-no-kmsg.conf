[Journal]
# Halium/Android vendor kernel drivers spam kmsg heavily on aurora -- most
# notably the sw5100_bms / QBG battery gauge, which error-storms several
# times per second whenever the Android-side battery daemon isn't feeding
# it userspace data. If journald ingests that flood it backs up and stalls
# the systemd manager (symptom: `systemctl` -> "Transport endpoint is not
# connected" while PID1 is still alive and uptime keeps growing). UBPorts's
# lxc-android-config ships the identical ReadKMsg=no for the same reason.
ReadKMsg=no
