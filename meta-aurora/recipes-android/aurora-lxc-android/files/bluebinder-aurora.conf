# meta-asteroid's bluebinder unit orders itself After=android-system.service,
# a unit that doesn't exist on aurora (hybris-gki-watch.inc removes the flat
# android-system stack; the Android side here is aurora-lxc-android.service).
# A non-existent After= is silently ignored, so bluebinder can start before
# the Halium rootfs is even mounted: bluebinder_wait.sh's libhybris getprop
# then fails to load bionic libc.so, never sees init.svc.*bluetooth, and the
# unit burns its full 90s start timeout before a restart succeeds (observed
# +44s of boot time). Order it after the container instead.
[Unit]
After=var-lib-lxc-android-rootfs.mount aurora-lxc-android.service
