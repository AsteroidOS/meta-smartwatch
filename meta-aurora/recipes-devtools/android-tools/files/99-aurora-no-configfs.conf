[Unit]
# Pull in our adbd-prepare (no-[Install] unit) so that whenever
# android-tools-adbd is started -- either by usb-moded's appsync_activate_pre
# StartUnit, or by anything else -- the FunctionFS mount at /dev/usb-ffs/adb is
# guaranteed in place first.
Wants=adbd-prepare.service
After=adbd-prepare.service

[Service]
# Aurora ships its own gadget skeleton (init_gfs.service); usb-moded manages
# /config/usb_gadget/g1/functions and configs/b.1 directly. The upstream
# android-tools-conf-configfs drop-in (10-adbd-configfs.conf) would create a
# second gadget ("adb" with ffs.usb0) on android-tools-adbd start and bind the
# UDC to it -- that collides with our g1/ffs.adb. Empty values here clear the
# prior drop-in's ExecStartPre/Post/StopPost so it doesn't fight us.
ExecStartPre=
ExecStartPost=
ExecStopPost=

# Capture adbd's stdout/stderr to /var/log -- journald doesn't ingest this
# service's output on aurora, and adbd is normally chatty about
# /dev/usb-ffs/adb/ep0 open errors, descriptor write failures, etc.
StandardOutput=append:/var/log/android-tools-adbd.log
StandardError=append:/var/log/android-tools-adbd.log
